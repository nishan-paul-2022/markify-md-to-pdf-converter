services:
  db:
    image: postgres:16-alpine
    container_name: markify_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /var/lib/markify/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - main_network

  app:
    image: ${IMAGE}:main
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markify_app
    restart: always
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - /var/www/markify-md-to-pdf-converter/public/uploads:/app/public/uploads
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PORT: ${PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main_network

networks:
  main_network:
    external: true
